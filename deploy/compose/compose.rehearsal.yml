services:
  postgres:
    command:
      - postgres
      - -c
      - io_method=${AGENTICS_POSTGRES_IO_METHOD:-io_uring}
    ports:
      - "${AGENTICS_COMPOSE_BIND_IP:-127.0.0.1}:${AGENTICS_POSTGRES_PORT:-15432}:5432"
    security_opt:
      - seccomp=unconfined

  rustfs:
    ports:
      - "${AGENTICS_COMPOSE_BIND_IP:-127.0.0.1}:${AGENTICS_RUSTFS_PORT:-19000}:9000"
      - "${AGENTICS_COMPOSE_BIND_IP:-127.0.0.1}:${AGENTICS_RUSTFS_CONSOLE_PORT:-19001}:9001"
