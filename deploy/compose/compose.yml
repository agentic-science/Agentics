services:
  postgres:
    image: postgres:18-alpine
    command:
      - postgres
      - -c
      - io_method=io_uring
    environment:
      POSTGRES_USER: ${AGENTICS_POSTGRES_USER:-agentics}
      POSTGRES_PASSWORD: ${AGENTICS_POSTGRES_PASSWORD:-agentics}
      POSTGRES_DB: ${AGENTICS_POSTGRES_DB:-agentics}
    security_opt:
      - seccomp=unconfined
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - type: volume
        source: postgres_data_pg18
        target: /var/lib/postgresql

volumes:
  postgres_data:
  postgres_data_pg18:
  cargo_registry:
  cargo_git:
  cargo_target:
  web_node_modules:
  web_next:
