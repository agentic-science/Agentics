services:
  platform-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentics
      POSTGRES_PASSWORD: agentics
      POSTGRES_DB: agentics
    ports:
      - "5432:5432"
    volumes:
      - agentics_platform_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentics -d agentics"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agentics_platform_db_data:
