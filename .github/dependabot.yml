---
version: 2
updates:
  # Rust workspace.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Bun workspace and frontend dependencies.
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # First-party runner and service images.
  - package-ecosystem: "docker"
    directories:
      - "/docker/runner-images/linux-arm64-cpu"
      - "/docker/runner-images/linux-arm64-cuda"
      - "/deploy/service-images/app"
      - "/deploy/service-images/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Deployment and test Compose image tags.
  - package-ecosystem: "docker-compose"
    directory: "/deploy/compose"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
